schema_version: 1

context:
  name: azure-mgmt-appcontainers
  version: 2.0.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/azure-mgmt-appcontainers-${{ version }}.zip
  sha256: 71c74876f7604d83d6119096aa42dcf2512e32e004111be5e41d61b89c8192f5

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - setuptools
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - azure-common >=1.1,<2.0
    - azure-mgmt-core >=1.3.2,<2.0
    - msrest >=0.7.1

tests:
  - python:
      imports:
        - azure.mgmt.appcontainers
        - azure.mgmt.appcontainers.aio
      pip_check: true
      python_version: ${{ python_min }}.*
about:
  summary: Microsoft Azure Appcontainers Management Client Library for Python
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/Azure/azure-sdk-for-python

extra:
  recipe-maintainers:
    - janjagusch
